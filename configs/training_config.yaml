# 训练配置文件

# 通用训练配置
general:
  seed: 42  # 随机种子
  device: "cuda"  # cuda 或 cpu
  num_workers: 4  # 数据加载线程数
  output_dir: "outputs"  # 输出目录
  log_dir: "logs"  # 日志目录
  checkpoint_dir: "checkpoints"  # 检查点目录

# 数据集配置
dataset:
  # 人脸检测数据集
  face_detection:
    name: "WIDER_FACE"
    data_dir: "data/raw/WIDER_FACE"
    annotation_file: "data/raw/WIDER_FACE/wider_face_train_bbx_gt.txt"
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1

  # 眼睛状态数据集
  eye_state:
    name: "Eye_State_Dataset"
    data_dir: "data/raw/eye_state"
    train_dir: "data/raw/eye_state/train"
    val_dir: "data/raw/eye_state/val"
    test_dir: "data/raw/eye_state/test"
    classes: ["closed", "open"]

  # 嘴巴状态数据集
  mouth_state:
    name: "Mouth_State_Dataset"
    data_dir: "data/raw/mouth_state"
    train_dir: "data/raw/mouth_state/train"
    val_dir: "data/raw/mouth_state/val"
    test_dir: "data/raw/mouth_state/test"
    classes: ["closed", "open"]

  # 手势识别数据集
  gesture:
    name: "Gesture_Dataset"
    data_dir: "data/raw/gesture"
    train_dir: "data/raw/gesture/train"
    val_dir: "data/raw/gesture/val"
    test_dir: "data/raw/gesture/test"
    classes: ["fist", "open_palm", "thumbs_up", "thumbs_down", "peace", "ok", "pointing", "wave", "pinch", "none"]

# 数据增强配置
augmentation:
  # 训练集增强
  train:
    - type: "RandomHorizontalFlip"
      probability: 0.5
    - type: "RandomRotation"
      degrees: 15
    - type: "ColorJitter"
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    - type: "RandomResizedCrop"
      size: [224, 224]
      scale: [0.8, 1.0]
    - type: "GaussianBlur"
      kernel_size: 3
      sigma: [0.1, 2.0]
    - type: "Normalize"
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

  # 验证集增强
  val:
    - type: "Resize"
      size: [224, 224]
    - type: "Normalize"
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# 模型训练配置
training:
  # 人脸检测训练
  face_detection:
    model: "yolov8"
    pretrained: true
    epochs: 100
    batch_size: 16
    learning_rate: 0.001
    weight_decay: 0.0005
    optimizer: "Adam"  # SGD, Adam, AdamW
    scheduler: "CosineAnnealingLR"  # StepLR, CosineAnnealingLR, ReduceLROnPlateau
    warmup_epochs: 5
    early_stopping: 10

  # 眼睛状态分类训练
  eye_state:
    model: "resnet50"
    pretrained: true
    epochs: 50
    batch_size: 32
    learning_rate: 0.0001
    weight_decay: 0.0001
    optimizer: "Adam"
    scheduler: "ReduceLROnPlateau"
    patience: 5
    early_stopping: 10

  # 嘴巴状态分类训练
  mouth_state:
    model: "resnet50"
    pretrained: true
    epochs: 50
    batch_size: 32
    learning_rate: 0.0001
    weight_decay: 0.0001
    optimizer: "Adam"
    scheduler: "ReduceLROnPlateau"
    patience: 5
    early_stopping: 10

  # 手势分类训练
  gesture:
    model: "efficientnet_b0"
    pretrained: true
    epochs: 80
    batch_size: 64
    learning_rate: 0.0003
    weight_decay: 0.0001
    optimizer: "AdamW"
    scheduler: "CosineAnnealingLR"
    warmup_epochs: 3
    early_stopping: 15

  # 动态手势识别训练
  dynamic_gesture:
    model: "lstm"
    epochs: 100
    batch_size: 32
    learning_rate: 0.001
    weight_decay: 0.0001
    optimizer: "Adam"
    scheduler: "StepLR"
    step_size: 20
    gamma: 0.1
    sequence_length: 30
    hidden_size: 256
    num_layers: 2

# 损失函数配置
loss:
  # 分类任务
  classification:
    type: "CrossEntropyLoss"  # CrossEntropyLoss, FocalLoss, LabelSmoothing
    label_smoothing: 0.1

  # 检测任务
  detection:
    type: "YOLOLoss"
    box_loss_weight: 0.05
    cls_loss_weight: 0.5
    dfl_loss_weight: 1.0

# 评估指标配置
metrics:
  # 检测任务指标
  detection:
    - "mAP@0.5"
    - "mAP@0.5:0.95"
    - "precision"
    - "recall"
    - "f1_score"

  # 分类任务指标
  classification:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "confusion_matrix"

# 数据加载配置
dataloader:
  train:
    batch_size: 32
    shuffle: true
    num_workers: 4
    pin_memory: true
    drop_last: true

  val:
    batch_size: 64
    shuffle: false
    num_workers: 4
    pin_memory: true
    drop_last: false

  test:
    batch_size: 1
    shuffle: false
    num_workers: 4
    pin_memory: true
    drop_last: false

# 日志和监控配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "logs/training.log"
  tensorboard: true
  wandb: false
  wandb_project: "driver-monitoring"
  wandb_entity: "your-username"

# 检查点配置
checkpoint:
  save_every: 5  # 每 N 个 epoch 保存一次
  save_best: true  # 是否保存最佳模型
  save_last: true  # 是否保存最后一个模型
  max_checkpoints: 5  # 最多保存多少个检查点

# 早停配置
early_stopping:
  enabled: true
  patience: 10  # 容忍多少个 epoch 没有改善
  min_delta: 0.001  # 最小改善幅度
  monitor: "val_loss"  # 监控指标
  mode: "min"  # min 或 max

# 混合精度训练
mixed_precision:
  enabled: false
  dtype: "float16"  # float16 或 bfloat16

# 分布式训练
distributed:
  enabled: false
  backend: "nccl"  # nccl, gloo
  world_size: 1
  rank: 0
