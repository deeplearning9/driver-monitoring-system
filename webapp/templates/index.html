<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驾驶员监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        header p {
            color: #888;
            margin-top: 10px;
        }

        .main-content {
            display: flex;
            gap: 30px;
        }

        .video-section {
            flex: 2;
        }

        .info-section {
            flex: 1;
        }

        .video-container {
            position: relative;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #videoFeed {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .status-badge {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #00ff88;
            animation: pulse 2s infinite;
        }

        .status-badge .dot.inactive {
            background-color: #ff4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .fps-counter {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #00ff88;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #000;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
        }

        .btn-settings {
            background: linear-gradient(135deg, #4488ff, #0066cc);
            color: #fff;
        }

        .btn-settings:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(68, 136, 255, 0.4);
        }

        .info-card {
            background-color: #222;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .info-card h3 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }

        .stat-value.normal {
            color: #00ff88;
        }

        .stat-value.warning {
            color: #ffaa00;
        }

        .stat-value.danger {
            color: #ff4444;
        }

        .alert-section {
            margin-top: 20px;
        }

        .alert-box {
            background-color: #331111;
            border: 1px solid #ff4444;
            border-radius: 10px;
            padding: 15px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .alert-box.active {
            display: block;
        }

        .alert-box .alert-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        .alert-box .alert-text {
            font-size: 16px;
            color: #ff4444;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gesture-display {
            margin-top: 20px;
        }

        .gesture-item {
            background-color: #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gesture-icon {
            font-size: 24px;
        }

        .gesture-info {
            flex: 1;
        }

        .gesture-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .gesture-command {
            font-size: 12px;
            color: #888;
        }

        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .settings-modal.active {
            display: flex;
        }

        .settings-content {
            background-color: #222;
            border-radius: 15px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }

        .settings-content h2 {
            color: #00ff88;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
        }

        .form-group input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 4px;
            outline: none;
        }

        .form-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #00ff88;
            border-radius: 50%;
            cursor: pointer;
        }

        .form-group .value-display {
            text-align: right;
            color: #00ff88;
            font-weight: bold;
            margin-top: 5px;
        }

        .settings-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            background-color: #000;
            border-radius: 10px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #333;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 驾驶员监控系统</h1>
            <p>基于深度学习的汽车座舱智能监控系统</p>
        </header>

        <div class="main-content">
            <div class="video-section">
                <div class="video-container">
                    <div id="videoFeed" class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                    <div class="video-overlay">
                        <div class="status-badge">
                            <span class="dot inactive" id="statusDot"></span>
                            <span id="statusText">未启动</span>
                        </div>
                        <div class="fps-counter">
                            FPS: <span id="fpsValue">0</span>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-start" id="btnStart" onclick="startMonitoring()">
                        ▶️ 启动监控
                    </button>
                    <button class="btn btn-stop" id="btnStop" onclick="stopMonitoring()" disabled>
                        ⏹️ 停止监控
                    </button>
                    <button class="btn btn-settings" onclick="openSettings()">
                        ⚙️ 设置
                    </button>
                </div>
            </div>

            <div class="info-section">
                <div class="info-card">
                    <h3>📊 驾驶员状态</h3>
                    <div class="stat-item">
                        <span class="stat-label">疲劳分数</span>
                        <span class="stat-value normal" id="fatigueValue">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">分心分数</span>
                        <span class="stat-value normal" id="distractionValue">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">眼睛状态</span>
                        <span class="stat-value normal" id="eyeState">正常</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">嘴巴状态</span>
                        <span class="stat-value normal" id="mouthState">正常</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">整体状态</span>
                        <span class="stat-value normal" id="overallState">正常</span>
                    </div>
                </div>

                <div class="info-card">
                    <h3>🎯 检测信息</h3>
                    <div class="stat-item">
                        <span class="stat-label">检测到人脸</span>
                        <span class="stat-value" id="faceCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">检测到手部</span>
                        <span class="stat-value" id="handCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">当前手势</span>
                        <span class="stat-value" id="currentGesture">-</span>
                    </div>
                </div>

                <div class="info-card gesture-display">
                    <h3>✋ 手势识别</h3>
                    <div id="gestureList">
                        <div class="gesture-item">
                            <span class="gesture-icon">✊</span>
                            <div class="gesture-info">
                                <div class="gesture-name">握拳</div>
                                <div class="gesture-command">命令: 停止</div>
                            </div>
                        </div>
                        <div class="gesture-item">
                            <span class="gesture-icon">🖐️</span>
                            <div class="gesture-info">
                                <div class="gesture-name">张开手掌</div>
                                <div class="gesture-command">命令: 开始</div>
                            </div>
                        </div>
                        <div class="gesture-item">
                            <span class="gesture-icon">👍</span>
                            <div class="gesture-info">
                                <div class="gesture-name">竖大拇指</div>
                                <div class="gesture-command">命令: 确认</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="alert-section">
                    <div class="alert-box" id="alertBox">
                        <span class="alert-icon">⚠️</span>
                        <span class="alert-text" id="alertText"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>驾驶员监控系统 v1.0.0 | 基于 PyTorch 和 OpenCV</p>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <h2>⚙️ 系统设置</h2>
            <div class="form-group">
                <label>疲劳检测阈值</label>
                <input type="range" id="fatigueThreshold" min="0" max="100" value="60"
                       oninput="updateThresholdDisplay(this, 'fatigueThresholdValue')">
                <div class="value-display" id="fatigueThresholdValue">0.60</div>
            </div>
            <div class="form-group">
                <label>分心检测阈值</label>
                <input type="range" id="distractionThreshold" min="0" max="100" value="50"
                       oninput="updateThresholdDisplay(this, 'distractionThresholdValue')">
                <div class="value-display" id="distractionThresholdValue">0.50</div>
            </div>
            <div class="form-group">
                <label>摄像头 ID</label>
                <input type="number" id="cameraId" value="0" min="0" max="10"
                       style="width: 100%; padding: 10px; background: #333; border: 1px solid #444; border-radius: 5px; color: #fff;">
            </div>
            <div class="settings-actions">
                <button class="btn btn-stop" onclick="closeSettings()">取消</button>
                <button class="btn btn-start" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let isMonitoring = false;
        let updateInterval = null;
        let ws = null;

        function startMonitoring() {
            const cameraId = document.getElementById('cameraId').value;

            fetch(`/api/start/${cameraId}`)
                .then(response => response.json())
                .then(data => {
                    console.log(data.message);
                    isMonitoring = true;
                    updateUI();
                    startUpdating();
                })
                .catch(error => {
                    console.error('启动失败:', error);
                });
        }

        function stopMonitoring() {
            fetch('/api/stop')
                .then(response => response.json())
                .then(data => {
                    console.log(data.message);
                    isMonitoring = false;
                    updateUI();
                    stopUpdating();
                })
                .catch(error => {
                    console.error('停止失败:', error);
                });
        }

        function updateUI() {
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (isMonitoring) {
                btnStart.disabled = true;
                btnStop.disabled = false;
                statusDot.classList.remove('inactive');
                statusText.textContent = '监控中';
            } else {
                btnStart.disabled = false;
                btnStop.disabled = true;
                statusDot.classList.add('inactive');
                statusText.textContent = '未启动';
            }
        }

        function startUpdating() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }

            updateInterval = setInterval(updateResults, 100);
        }

        function stopUpdating() {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
        }

        function updateResults() {
            fetch('/api/results')
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        return;
                    }

                    // 更新视频
                    const videoFeed = document.getElementById('videoFeed');
                    videoFeed.innerHTML = `<img src="data:image/jpeg;base64,${data.frame}" style="width: 100%; height: auto;">`;

                    // 更新 FPS
                    document.getElementById('fpsValue').textContent = data.results.fps.toFixed(1);

                    // 更新检测信息
                    document.getElementById('faceCount').textContent = data.results.faces_count;
                    document.getElementById('handCount').textContent = data.results.hands_count;

                    // 更新驾驶员状态
                    const driverState = data.results.driver_state;
                    if (driverState) {
                        updateStateValue('fatigueValue', driverState.fatigue_score);
                        updateStateValue('distractionValue', driverState.distraction_score);

                        const eyeState = driverState.eyes_closed ? '闭合' : '正常';
                        document.getElementById('eyeState').textContent = eyeState;

                        const mouthState = driverState.yawning ? '打哈欠' : '正常';
                        document.getElementById('mouthState').textContent = mouthState;

                        const overallState = driverState.overall_state;
                        const stateText = {
                            'normal': '正常',
                            'fatigued': '疲劳',
                            'yawning': '打哈欠',
                            'distracted': '分心'
                        };
                        document.getElementById('overallState').textContent = stateText[overallState] || overallState;

                        // 更新警告
                        if (overallState !== 'normal') {
                            showAlert(getAlertMessage(overallState));
                        } else {
                            hideAlert();
                        }
                    }
                })
                .catch(error => {
                    console.error('更新失败:', error);
                });
        }

        function updateStateValue(elementId, value) {
            const element = document.getElementById(elementId);
            element.textContent = value.toFixed(2);

            // 根据值更新颜色
            if (value > 0.6) {
                element.className = 'stat-value danger';
            } else if (value > 0.3) {
                element.className = 'stat-value warning';
            } else {
                element.className = 'stat-value normal';
            }
        }

        function getAlertMessage(state) {
            const messages = {
                'fatigued': '⚠️ 警告：检测到疲劳驾驶！',
                'yawning': '⚠️ 注意：检测到打哈欠',
                'distracted': '⚠️ 警告：检测到分心驾驶！'
            };
            return messages[state] || '';
        }

        function showAlert(message) {
            const alertBox = document.getElementById('alertBox');
            const alertText = document.getElementById('alertText');

            alertText.textContent = message;
            alertBox.classList.add('active');
        }

        function hideAlert() {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.remove('active');
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function updateThresholdDisplay(slider, displayId) {
            const value = slider.value / 100;
            document.getElementById(displayId).textContent = value.toFixed(2);
        }

        function saveSettings() {
            const fatigueThreshold = document.getElementById('fatigueThreshold').value / 100;
            const distractionThreshold = document.getElementById('distractionThreshold').value / 100;

            fetch('/api/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    fatigue_threshold: fatigueThreshold,
                    distraction_threshold: distractionThreshold
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log(data.message);
                closeSettings();
            })
            .catch(error => {
                console.error('保存设置失败:', error);
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('驾驶员监控系统已加载');
        });
    </script>
</body>
</html>
